server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Increase client body size for file uploads
    client_max_body_size 64M;

    # Gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # AssetMapper compiled assets — served directly from disk (fast)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Static assets — serve directly, long cache (images, fonts, etc.)
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff2?|ttf|eot|map)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # CSS/JS in public/ (non-AssetMapper) — serve from disk, fall through to PHP
    location ~* \.(css|js)$ {
        expires 30d;
        access_log off;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        internal;
    }

    # Block access to other .php files
    location ~ \.php$ {
        return 404;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
