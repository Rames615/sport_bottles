services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports_bottles_app
    restart: unless-stopped
    expose:
      - "80"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_var:/var/www/html/var
      - products_images:/var/www/html/public/products_images
    networks:
      - sports

  db:
    image: mysql:8.0.30
    container_name: sports_bottles_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sports

  caddy:
    image: caddy:2-alpine
    container_name: sports_bottles_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - sports

networks:
  sports:

volumes:
  db_data:
  app_var:
  products_images:
  caddy_data:
  caddy_config:
